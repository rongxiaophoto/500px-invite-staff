<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500px内部邀请函生成</title>
  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:#f5f6fa;
      padding:20px;
      color:#222;
    }

    .wrap{
      width:100%;
      max-width:1180px;
      margin:0 auto;
    }

    .box{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      margin:0 auto 20px;
    }

    .title{
      font-size:22px;
      font-weight:700;
      text-align:center;
      line-height:1.5;
      margin-bottom:12px;
    }

    .tips{
      font-size:12px;
      color:#999;
      text-align:center;
      margin-bottom:14px;
      line-height:1.7;
    }

    textarea{
      width:100%;
      min-height:180px;
      border:1px solid #ddd;
      border-radius:10px;
      padding:12px;
      margin-bottom:12px;
      font-size:14px;
      line-height:1.6;
      box-sizing:border-box;
      resize:vertical;
      font-family:inherit;
    }

    button{
      width:100%;
      height:46px;
      background:#000;
      color:#fff;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

    .msg{
      text-align:center;
      margin-top:12px;
      color:#d93025;
      font-size:14px;
      line-height:1.6;
      min-height:22px;
    }

    .summary{
      text-align:center;
      color:#666;
      font-size:13px;
      margin-bottom:16px;
    }

    .result-list{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
      gap:16px;
    }

    .card{
      background:#fff;
      border-radius:14px;
      padding:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.06);
    }

    .card-name{
      font-size:14px;
      font-weight:600;
      margin-bottom:10px;
      word-break:break-all;
    }

    .card img{
      width:100%;
      border-radius:10px;
      display:block;
      background:#f1f1f1;
    }

    .save-tip{
      font-size:12px;
      color:#999;
      text-align:center;
      margin-top:8px;
      line-height:1.5;
    }

    .loading{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,0.92);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:9999;
    }

    .spinner{
      width:40px;
      height:40px;
      border:4px solid #ddd;
      border-top:4px solid #000;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:10px;
    }

    .loading p{
      margin:0;
      font-size:14px;
      color:#333;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    @media (max-width: 768px){
      body{padding:14px;}
      .box{padding:18px;}
      .result-list{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="box">
    <div class="title">
      视觉中国500px视觉盛典深圳站<br>
      内部邀请函生成
    </div>

    <div class="tips">
      仅供内部使用<br>
      支持批量生成：一行输入一个用户名
    </div>

    <textarea id="usernames" placeholder="请输入用户名，一行一个，例如：&#10;张三&#10;李四&#10;王五"></textarea>

    <button id="generateBtn" onclick="generateBatch()">生成邀请函</button>

    <div id="msg" class="msg"></div>
  </div>

  <div id="summary" class="summary"></div>
  <div id="resultList" class="result-list"></div>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>正在生成邀请函...</p>
</div>

<script>
function loadBackground() {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.src = "invitation-bg.jpg";
    img.onload = () => resolve(img);
    img.onerror = reject;
  });
}

function drawInvitation(bgImg, username) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = bgImg.width;
  canvas.height = bgImg.height;
  ctx.drawImage(bgImg, 0, 0);

  const centerX = canvas.width / 2;
  const nameY = canvas.height * 0.28;

  const maxTextWidth = canvas.width * 0.52;
  let fontSize = canvas.width * 0.07;
  const minFontSize = canvas.width * 0.035;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#ffffff";

  while (fontSize > minFontSize) {
    ctx.font = `700 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
    const textWidth = ctx.measureText(username).width;
    if (textWidth <= maxTextWidth) {
      break;
    }
    fontSize -= 4;
  }

  ctx.shadowColor = "rgba(0,0,0,0.22)";
  ctx.shadowBlur = 20;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 4;

  ctx.fillText(username, centerX, nameY);

  ctx.lineWidth = Math.max(2, fontSize * 0.035);
  ctx.strokeStyle = "rgba(255,255,255,0.22)";
  ctx.strokeText(username, centerX, nameY);

  return canvas.toDataURL("image/jpeg", 0.95);
}

async function generateBatch() {
  const textarea = document.getElementById("usernames");
  const msg = document.getElementById("msg");
  const summary = document.getElementById("summary");
  const resultList = document.getElementById("resultList");
  const loading = document.getElementById("loading");
  const button = document.getElementById("generateBtn");

  msg.innerHTML = "";
  summary.innerHTML = "";
  resultList.innerHTML = "";

  const usernames = textarea.value
    .split(/\r?\n/)
    .map(name => name.trim())
    .filter(Boolean);

  if (!usernames.length) {
    msg.innerText = "请输入用户名";
    return;
  }

  loading.style.display = "flex";
  button.disabled = true;
  button.innerText = "生成中...";

  try {
    const bgImg = await loadBackground();

    usernames.forEach(username => {
      const base64 = drawInvitation(bgImg, username);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-name">${escapeHtml(username)}</div>
        <img src="${base64}" alt="${escapeHtml(username)}的邀请函">
        <div class="save-tip">点击图片可在新窗口打开，或直接右键另存为</div>
      `;

      const img = card.querySelector("img");
      img.addEventListener("click", () => {
        const newWindow = window.open();
        if (newWindow) {
          newWindow.document.write(`<img src="${base64}" style="max-width:100%;display:block;margin:0 auto;" alt="邀请函">`);
        }
      });

      resultList.appendChild(card);
    });

    summary.innerText = `已生成 ${usernames.length} 张邀请函`;
  } catch (e) {
    msg.innerText = "底图加载失败，请检查 invitation-bg.jpg 是否与当前页面放在同一目录";
  } finally {
    loading.style.display = "none";
    button.disabled = false;
    button.innerText = "生成邀请函";
  }
}

function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
</script>

</body>
</html>
