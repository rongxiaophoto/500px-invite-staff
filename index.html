<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>500px邀请函内部生成</title>
  <style>
    :root{
      --bg:#f5f6fa;
      --card:#ffffff;
      --text:#111111;
      --sub:#666666;
      --line:#e9eaef;
      --primary:#000000;
      --radius:18px;
      --shadow:0 10px 28px rgba(0,0,0,0.08);
      --safe-bottom: max(16px, env(safe-area-inset-bottom));
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    }

    body{
      min-height:100vh;
    }

    .page{
      width:100%;
      max-width:680px;
      margin:0 auto;
      padding:16px 14px calc(90px + var(--safe-bottom));
    }

    .panel{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px 16px;
    }

    .title{
      font-size:22px;
      font-weight:700;
      line-height:1.4;
      text-align:center;
      margin:0 0 8px;
    }

    .desc{
      font-size:13px;
      line-height:1.7;
      color:var(--sub);
      text-align:center;
      margin:0 0 16px;
    }

    .label{
      font-size:14px;
      font-weight:600;
      margin:0 0 8px;
    }

    textarea{
      width:100%;
      min-height:140px;
      max-height:42vh;
      resize:vertical;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 14px;
      font-size:16px;
      line-height:1.6;
      outline:none;
      background:#fff;
      -webkit-appearance:none;
      appearance:none;
    }

    textarea:focus{
      border-color:#b8bcc7;
      box-shadow:0 0 0 3px rgba(0,0,0,0.04);
    }

    .helper{
      margin-top:8px;
      font-size:12px;
      line-height:1.6;
      color:#888;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .ghost-btn{
      height:40px;
      padding:0 14px;
      border:1px solid var(--line);
      background:#fff;
      color:#333;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ghost-btn:active{
      transform:scale(0.98);
    }

    .msg{
      margin-top:12px;
      font-size:14px;
      line-height:1.7;
      color:#d93025;
      text-align:center;
      min-height:24px;
    }

    .result-wrap{
      margin-top:18px;
    }

    .result-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }

    .result-title{
      font-size:16px;
      font-weight:700;
      margin:0;
    }

    .result-count{
      font-size:12px;
      color:#777;
      white-space:nowrap;
    }

    .cards{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .card{
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,0.03);
    }

    .card-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
    }

    .card-name{
      font-size:15px;
      font-weight:700;
      line-height:1.4;
      word-break:break-all;
    }

    .download-btn{
      flex-shrink:0;
      border:none;
      background:#f2f3f7;
      color:#222;
      border-radius:10px;
      padding:8px 12px;
      font-size:13px;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .download-btn:active{
      transform:scale(0.98);
    }

    .card img{
      display:block;
      width:100%;
      height:auto;
      background:#f2f2f2;
    }

    .save-tip{
      margin:0;
      padding:10px 14px 14px;
      font-size:12px;
      line-height:1.6;
      color:#888;
      text-align:center;
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      padding:10px 14px var(--safe-bottom);
      background:rgba(245,246,250,0.92);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-top:1px solid rgba(0,0,0,0.06);
    }

    .bottom-inner{
      width:100%;
      max-width:680px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .primary-btn{
      width:100%;
      height:50px;
      border:none;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow:0 8px 24px rgba(0,0,0,0.18);
    }

    .primary-btn:disabled{
      opacity:0.55;
      cursor:not-allowed;
      box-shadow:none;
    }

    .loading{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:999;
      padding:20px;
      text-align:center;
    }

    .spinner{
      width:40px;
      height:40px;
      border:4px solid #ddd;
      border-top:4px solid #000;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-bottom:12px;
    }

    .loading p{
      margin:0;
      font-size:14px;
      color:#333;
      line-height:1.6;
    }

    @keyframes spin{ to{ transform:rotate(360deg);} }

    @media (min-width: 700px){
      .page{ padding:24px 20px calc(96px + var(--safe-bottom)); }
      .panel{ padding:24px; }
      .cards{ grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <h1 class="title">视觉中国500px视觉盛典深圳站<br>内部邀请函生成</h1>
      <p class="desc">内部使用版<br>一行输入一个用户名，可一次批量生成多张邀请函。</p>

      <div class="label">请输入用户名</div>
      <textarea id="usernames" placeholder="请输入用户名，一行一个"></textarea>
      <div class="helper">支持批量生成；自动去除空行；结果会直接显示在页面下方，手机端可长按图片保存。</div>

      <div class="toolbar">
        <button class="ghost-btn" type="button" onclick="clearNames()">清空输入</button>
      </div>

      <div id="msg" class="msg"></div>
    </div>

    <div id="resultWrap" class="result-wrap" style="display:none;">
      <div class="result-head">
        <h2 class="result-title">已生成邀请函</h2>
        <div id="resultCount" class="result-count"></div>
      </div>
      <div id="cards" class="cards"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <button id="generateBtn" class="primary-btn" type="button" onclick="generateBatch()">立即生成邀请函</button>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>正在生成邀请函，请稍候…</p>
  </div>

  
<script>
  let cachedBgImage = null;

  function getNames() {
    return document.getElementById("usernames").value
      .split("\n")
      .map(item => item.trim())
      .filter(Boolean);
  }

  function clearResults() {
    document.getElementById("cards").innerHTML = "";
    document.getElementById("resultWrap").style.display = "none";
    document.getElementById("resultCount").innerText = "";
    document.getElementById("msg").innerText = "";
  }

  function clearInput() {
    document.getElementById("usernames").value = "";
    clearResults();
  }

  function preloadBg() {
    return new Promise((resolve, reject) => {
      if (cachedBgImage) {
        resolve(cachedBgImage);
        return;
      }

      const img = new Image();
      img.src = "invitation-bg.jpg";
      img.onload = function () {
        cachedBgImage = img;
        resolve(img);
      };
      img.onerror = function () {
        reject(new Error("底图加载失败，请检查 invitation-bg.jpg 是否与当前 html 在同一目录"));
      };
    });
  }

  function renderInvitation(name) {
    const img = cachedBgImage;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    const centerX = canvas.width / 2;
    const nameY = canvas.height * 0.28;
    const maxTextWidth = canvas.width * 0.52;

    let fontSize = canvas.width * 0.07;
    const minFontSize = canvas.width * 0.035;

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#ffffff";

    while (fontSize > minFontSize) {
      ctx.font = `700 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
      const textWidth = ctx.measureText(name).width;
      if (textWidth <= maxTextWidth) break;
      fontSize -= 4;
    }

    ctx.shadowColor = "rgba(0,0,0,0.22)";
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 4;

    ctx.fillText(name, centerX, nameY);

    ctx.lineWidth = Math.max(2, fontSize * 0.035);
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.strokeText(name, centerX, nameY);

    return canvas.toDataURL("image/jpeg", 0.82);
  }

  function createCard(name, dataUrl) {
    const card = document.createElement("div");
    card.className = "card";

    const top = document.createElement("div");
    top.className = "card-top";

    const nameEl = document.createElement("div");
    nameEl.className = "card-name";
    nameEl.innerText = name;

    const btn = document.createElement("a");
    btn.className = "download-btn";
    btn.innerText = "下载";
    btn.href = dataUrl;
    btn.download = `${name}-邀请函.jpg`;

    top.appendChild(nameEl);
    top.appendChild(btn);

    const image = document.createElement("img");
    image.src = dataUrl;
    image.alt = `${name}的邀请函`;
    image.loading = "lazy";

    const tip = document.createElement("p");
    tip.className = "save-tip";
    tip.innerText = "邀请函已生成在下方，手机端长按保存，电脑端可点击下载。";

    card.appendChild(top);
    card.appendChild(image);
    card.appendChild(tip);

    return card;
  }

  async function generateBatch() {
    const btn = document.getElementById("generateBtn");
    const msg = document.getElementById("msg");
    const cards = document.getElementById("cards");
    const resultWrap = document.getElementById("resultWrap");
    const resultCount = document.getElementById("resultCount");

    const names = getNames();

    msg.innerText = "";
    cards.innerHTML = "";

    if (!names.length) {
      msg.innerText = "请输入用户名，一行一个。";
      resultWrap.style.display = "none";
      return;
    }

    btn.disabled = true;
    btn.innerText = "生成中...";

    try {
      await preloadBg();

      const fragment = document.createDocumentFragment();
      const generated = [];

      for (let i = 0; i < names.length; i++) {
        const name = names[i];
        const dataUrl = renderInvitation(name);
        generated.push({ name, dataUrl });
      }

      for (let i = 0; i < generated.length; i++) {
        fragment.appendChild(createCard(generated[i].name, generated[i].dataUrl));
      }

      cards.appendChild(fragment);
      resultWrap.style.display = "block";
      resultCount.innerText = `共生成 ${generated.length} 张`;
      msg.innerText = "";
    } catch (error) {
      msg.innerText = error.message || "生成失败，请稍后重试";
      resultWrap.style.display = "none";
    } finally {
      btn.disabled = false;
      btn.innerText = "立即生成邀请函";
    }
  }

  window.addEventListener("load", function () {
    preloadBg().catch(() => {});
  });
</script>
</body>

</html>
